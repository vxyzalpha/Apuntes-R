# 📄 `webr.html` (CLAVE 🔥)

Crea un archivo en la **misma carpeta** llamado `webr.html`:

```html
<script type="module">
import { WebR } from "https://webr.r-wasm.org/latest/webr.mjs";

const webR = new WebR();
await webR.init();

window.webR = webR;
</script>

<script>
document.addEventListener("DOMContentLoaded", () => {
  const blocks = document.querySelectorAll("pre code.language-r");

  blocks.forEach((block) => {
    const button = document.createElement("button");
    button.innerText = "Run";
    button.style.marginBottom = "5px";

    button.onclick = async () => {
      const code = block.innerText;
      const result = await window.webR.evalR(code);
      const output = await result.toString();

      let out = block.parentElement.querySelector(".output");
      if (!out) {
        out = document.createElement("div");
        out.className = "output";
        out.style.background = "#f5f5f5";
        out.style.padding = "10px";
        out.style.marginTop = "5px";
        block.parentElement.appendChild(out);
      }

      out.innerText = output;
    };

    block.parentElement.insertBefore(button, block);
  });
});
</script>
